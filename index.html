<style>
  :root{
    --bg:#f6f0e3;
    --card:#fdfaf2;
    --card-edge:#e3d7bc;
    --ink:#232f48;
    --muted:#636980;
    --faint:#9a9482;
    --gold:#b8912f;
    --gold-deep:#9a7724;
    --navy:#232f48;
    --line:rgba(35,47,72,.14);
    --olive:#8f8226;
    --chili:#c05f17;
    --cherry:#8e3038;
    --tonic:#c2a83e;
    --peel:#d98e3b;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Karla',sans-serif;
    font-size:16px;
    line-height:1.5;
    min-height:100vh;
    padding-bottom:64px;
  }
  .wrap{max-width:640px;margin:0 auto;padding:0 20px}

  header{padding:40px 0 4px;text-align:center}
  .logo{
    width:min(300px,72vw);height:auto;display:block;margin:0 auto;
    mix-blend-mode:multiply;
  }
  .sub{
    color:var(--gold-deep);font-size:13px;margin-top:6px;
    letter-spacing:.24em;text-transform:uppercase;
  }
  .drops-rule{display:flex;justify-content:center;gap:9px;margin:26px auto 30px}
  .drops-rule span{width:7px;height:7px;border-radius:50%;background:var(--gold);opacity:.9}
  .drops-rule span:nth-child(2){width:10px;height:10px;margin-top:-1px}
  .drops-rule span:nth-child(4){width:5px;height:5px;margin-top:1px}

  section{margin-bottom:14px}
  .cat-head{
    width:100%;display:flex;align-items:baseline;justify-content:space-between;
    background:none;border:none;color:var(--ink);
    font-family:'Karla',sans-serif;cursor:pointer;
    padding:16px 2px 10px;border-bottom:2px solid var(--gold);
    -webkit-tap-highlight-color:transparent;
  }
  .cat-title{font-size:12px;letter-spacing:.26em;text-transform:uppercase;font-weight:700;color:var(--navy)}
  .cat-meta{display:flex;align-items:center;gap:12px}
  .cat-count{font-size:12px;color:var(--faint);letter-spacing:.08em}
  .chev{display:inline-block;color:var(--gold-deep);transition:transform .25s ease;font-size:13px}
  section.open .chev{transform:rotate(180deg)}
  .cat-body{overflow:hidden;max-height:0;transition:max-height .4s ease}
  section.open .cat-body{max-height:none;overflow:visible}
  section:not(.open) .cat-body{max-height:0}

  .card{
    background:var(--card);border:1px solid var(--card-edge);
    border-radius:10px;padding:24px 22px 20px;margin:18px 0;
    position:relative;
    box-shadow:0 1px 3px rgba(35,47,72,.06);
  }
  .card h2{font-family:'Fraunces',serif;font-weight:600;font-size:26px;line-height:1.15;color:var(--navy)}
  .tagline{color:var(--muted);font-size:13.5px;margin-top:5px;font-style:italic;font-family:'Fraunces',serif}
  .status{
    display:inline-block;margin-top:10px;
    font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--gold-deep);border:1px solid var(--card-edge);border-radius:3px;padding:3px 8px;
    background:rgba(184,145,47,.07);
  }
  .card-drops{display:flex;gap:7px;margin:16px 0 14px}
  .card-drops i{width:6px;height:6px;border-radius:50%;display:block}
  .card-drops i:nth-child(2){width:8px;height:8px;margin-top:-1px}
  .card-drops i:nth-child(5){width:4px;height:4px;margin-top:1px}

  .spec{list-style:none;margin-top:4px}
  .spec li{
    display:flex;gap:14px;padding:5.5px 0;
    border-bottom:1px dotted rgba(35,47,72,.14);font-size:15px;
  }
  .spec li:last-child{border-bottom:none}
  .amt{flex:0 0 84px;color:var(--gold-deep);font-weight:700;font-variant-numeric:tabular-nums;font-size:14px}
  .seasoning-label,.method-label{
    font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--faint);margin:16px 0 4px;
  }
  .seasoning,.method{font-size:14px;color:var(--muted);line-height:1.6}
  .note{
    margin-top:14px;padding-top:12px;border-top:1px solid var(--line);
    font-size:13px;color:var(--faint);line-height:1.55;
  }

  .edit-btn{
    position:absolute;top:18px;right:16px;
    background:none;border:1px solid var(--card-edge);border-radius:5px;
    color:var(--faint);font-family:'Karla',sans-serif;
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    padding:5px 10px;cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .edit-btn:active{color:var(--navy);border-color:var(--gold)}
  .add-btn{
    width:100%;background:none;
    border:1px dashed var(--card-edge);border-radius:10px;
    color:var(--faint);font-family:'Karla',sans-serif;
    font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    padding:14px;margin:4px 0 18px;cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .add-btn:active{color:var(--gold-deep);border-color:var(--gold)}

  /* editor */
  .overlay{
    position:fixed;inset:0;background:rgba(35,47,72,.55);
    display:none;align-items:flex-start;justify-content:center;
    overflow-y:auto;z-index:50;padding:24px 14px 60px;
  }
  .overlay.show{display:flex}
  .editor{
    background:var(--card);border:1px solid var(--card-edge);
    border-radius:12px;width:100%;max-width:560px;
    padding:26px 22px;
    box-shadow:0 8px 30px rgba(35,47,72,.25);
  }
  .editor h3{font-family:'Fraunces',serif;font-weight:600;font-size:22px;margin-bottom:18px;color:var(--navy)}
  .field{margin-bottom:14px}
  .field label{
    display:block;font-size:10.5px;letter-spacing:.2em;
    text-transform:uppercase;color:var(--faint);margin-bottom:5px;
  }
  .field input,.field textarea,.field select{
    width:100%;background:#fffdf8;
    border:1px solid var(--card-edge);border-radius:6px;
    color:var(--ink);font-family:'Karla',sans-serif;font-size:15px;
    padding:10px 12px;
  }
  .field textarea{resize:vertical;min-height:64px;line-height:1.5}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--gold)}
  .hint{font-size:11.5px;color:var(--faint);margin-top:4px;line-height:1.45}
  .drop-picker{display:flex;gap:12px;margin-top:2px}
  .drop-opt{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent}
  .drop-opt.sel{border-color:var(--navy)}
  .editor-actions{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap}
  .btn{
    flex:1;border-radius:6px;padding:12px;cursor:pointer;
    font-family:'Karla',sans-serif;font-size:13px;
    letter-spacing:.12em;text-transform:uppercase;font-weight:700;
    -webkit-tap-highlight-color:transparent;
  }
  .btn-save{background:var(--navy);border:none;color:#f6f0e3}
  .btn-cancel{background:none;border:1px solid var(--card-edge);color:var(--muted)}
  .btn-delete{
    flex-basis:100%;background:none;border:none;color:var(--cherry);
    font-size:12px;letter-spacing:.12em;text-transform:uppercase;
    padding:10px;cursor:pointer;margin-top:2px;
  }

  footer{
    text-align:center;margin-top:48px;color:var(--faint);
    font-size:12px;letter-spacing:.06em;line-height:1.8;
  }
  footer .drops-rule{margin:0 auto 16px}
  footer .drops-rule span{background:var(--gold);opacity:.45}
  .backup-row{margin-top:18px}
  .backup-btn{
    background:none;border:1px solid var(--card-edge);border-radius:5px;
    color:var(--faint);font-family:'Karla',sans-serif;
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    padding:6px 12px;cursor:pointer;margin:0 4px 8px;
  }

  @media (prefers-reduced-motion: reduce){
    .cat-body,.chev{transition:none}
  }
</style>

/* ---------- storage ---------- */
function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && Array.isArray(parsed.drinks)) return parsed;
    }
  }catch(e){}
  return JSON.parse(JSON.stringify(SEED));
}
function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }catch(e){
    alert("Couldn't save — your browser may be blocking storage (private mode?). Changes will be lost on reload.");
  }
}

let data = loadData();

/* ---------- render ---------- */
const menu = document.getElementById("menu");
const openState = {};
data.categories.forEach(c => openState[c.id] = c.open);

function esc(s){
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function render(){
  menu.innerHTML = "";
  data.categories.forEach(cat => {
    const drinks = data.drinks.filter(d => d.cat === cat.id);
    const section = document.createElement("section");
    section.id = cat.id;
    if(openState[cat.id]) section.classList.add("open");

    const btn = document.createElement("button");
    btn.className = "cat-head";
    btn.setAttribute("aria-expanded", openState[cat.id] ? "true" : "false");
    btn.innerHTML = `
      <span class="cat-title">${esc(cat.title)}</span>
      <span class="cat-meta">
        <span class="cat-count">${drinks.length}</span>
        <span class="chev">▾</span>
      </span>`;
    btn.addEventListener("click", () => {
      openState[cat.id] = !openState[cat.id];
      section.classList.toggle("open", openState[cat.id]);
      btn.setAttribute("aria-expanded", openState[cat.id] ? "true" : "false");
    });

    const body = document.createElement("div");
    body.className = "cat-body";

    drinks.forEach(d => body.appendChild(renderCard(d)));

    const add = document.createElement("button");
    add.className = "add-btn";
    add.textContent = "+ Add recipe";
    add.addEventListener("click", () => openEditor(null, cat.id));
    body.appendChild(add);

    section.appendChild(btn);
    section.appendChild(body);
    menu.appendChild(section);
  });
}

function renderCard(d){
  const card = document.createElement("article");
  card.className = "card";
  const specRows = String(d.spec || "").split("\n").filter(l => l.trim()).map(line => {
    const idx = line.indexOf("|");
    const amt = idx >= 0 ? line.slice(0, idx).trim() : "";
    const ing = idx >= 0 ? line.slice(idx + 1).trim() : line.trim();
    return `<li><span class="amt">${esc(amt)}</span><span>${esc(ing)}</span></li>`;
  }).join("");

  card.innerHTML = `
    <button class="edit-btn">Edit</button>
    <h2>${esc(d.name)}</h2>
    <div class="tagline">${esc(d.tagline)}</div>
    ${d.status ? `<div class="status">${esc(d.status)}</div>` : ""}
    <div class="card-drops" aria-hidden="true">
      ${`<i style="background:${esc(d.drop)}"></i>`.repeat(5)}
    </div>
    <ul class="spec">${specRows}</ul>
    ${d.seasoning && d.seasoning !== "—" ? `
      <div class="seasoning-label">Seasoning</div>
      <div class="seasoning">${esc(d.seasoning)}</div>` : ""}
    <div class="method-label">Method</div>
    <div class="method">${esc(d.method)}</div>
    ${d.note ? `<div class="note">${esc(d.note)}</div>` : ""}
  `;
  card.querySelector(".edit-btn").addEventListener("click", () => openEditor(d.id, d.cat));
  return card;
}

/* ---------- editor ---------- */
const overlay = document.getElementById("overlay");
const dropPicker = document.getElementById("dropPicker");
let editingId = null;
let selectedDrop = DROP_COLORS[0][1];

DROP_COLORS.forEach(([name, hex]) => {
  const el = document.createElement("div");
  el.className = "drop-opt";
  el.style.background = hex;
  el.title = name;
  el.dataset.hex = hex;
  el.addEventListener("click", () => {
    selectedDrop = hex;
    dropPicker.querySelectorAll(".drop-opt").forEach(o => o.classList.toggle("sel", o.dataset.hex === hex));
  });
  dropPicker.appendChild(el);
});

function openEditor(id, catId){
  editingId = id;
  const d = id ? data.drinks.find(x => x.id === id) : null;
  document.getElementById("editorTitle").textContent = d ? "Edit recipe" : "New recipe";
  document.getElementById("f-name").value = d ? d.name : "";
  document.getElementById("f-tagline").value = d ? d.tagline : "";
  document.getElementById("f-category").value = d ? d.cat : (catId || "finalized");
  document.getElementById("f-status").value = d ? d.status : "";
  document.getElementById("f-spec").value = d ? d.spec : "";
  document.getElementById("f-seasoning").value = d ? d.seasoning : "";
  document.getElementById("f-method").value = d ? d.method : "";
  document.getElementById("f-note").value = d ? d.note : "";
  selectedDrop = d ? d.drop : DROP_COLORS[0][1];
  dropPicker.querySelectorAll(".drop-opt").forEach(o => o.classList.toggle("sel", o.dataset.hex === selectedDrop));
  document.getElementById("deleteBtn").style.display = d ? "block" : "none";
  overlay.classList.add("show");
  overlay.scrollTop = 0;
}

function closeEditor(){
  overlay.classList.remove("show");
  editingId = null;
}

document.getElementById("cancelBtn").addEventListener("click", closeEditor);
overlay.addEventListener("click", e => { if(e.target === overlay) closeEditor(); });

document.getElementById("saveBtn").addEventListener("click", () => {
  const name = document.getElementById("f-name").value.trim();
  if(!name){ alert("The recipe needs a name."); return; }
  const rec = {
    id: editingId || ("r-" + Date.now()),
    cat: document.getElementById("f-category").value,
    name,
    tagline: document.getElementById("f-tagline").value.trim(),
    status: document.getElementById("f-status").value.trim(),
    drop: selectedDrop,
    spec: document.getElementById("f-spec").value.trim(),
    seasoning: document.getElementById("f-seasoning").value.trim(),
    method: document.getElementById("f-method").value.trim(),
    note: document.getElementById("f-note").value.trim()
  };
  if(editingId){
    const i = data.drinks.findIndex(x => x.id === editingId);
    if(i >= 0) data.drinks[i] = rec;
  }else{
    data.drinks.push(rec);
    openState[rec.cat] = true;
  }
  saveData();
  render();
  closeEditor();
});

document.getElementById("deleteBtn").addEventListener("click", () => {
  if(!editingId) return;
  const d = data.drinks.find(x => x.id === editingId);
  if(confirm(`Delete "${d ? d.name : "this recipe"}"? This can't be undone (except by re-importing a backup).`)){
    data.drinks = data.drinks.filter(x => x.id !== editingId);
    saveData();
    render();
    closeEditor();
  }
});

/* ---------- backup ---------- */
document.getElementById("exportBtn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "alfred-east-recipes.json";
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById("importBtn").addEventListener("click", () => {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "application/json,.json";
  input.addEventListener("change", () => {
    const file = input.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const parsed = JSON.parse(reader.result);
        if(!parsed || !Array.isArray(parsed.drinks)) throw new Error("bad format");
        data = parsed;
        data.categories.forEach(c => { if(!(c.id in openState)) openState[c.id] = c.open; });
        saveData();
        render();
      }catch(e){
        alert("That file doesn't look like an Alfred East backup.");
      }
    };
    reader.readAsText(file);
  });
  input.click();
});

document.getElementById("resetBtn").addEventListener("click", () => {
  if(confirm("Reset to the original recipe set? Your edits and additions will be removed.")){
    data = JSON.parse(JSON.stringify(SEED));
    localStorage.removeItem(STORAGE_KEY);
    render();
  }
});

render();
</script>
</body>
</html>
